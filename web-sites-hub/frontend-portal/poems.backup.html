        function normalizeAuthor(author) {
            // 统一把作者字段清洗成「人名」尾部，避免后端格式不同导致定位失败
            if (!author) return '';
            const s = String(author).trim();
            // 常见分隔符：' · ' / '·' / '.'
            if (s.includes('/')) return s.split('/').filter(Boolean).pop().trim();
            if (s.includes('·')) return s.split('·').filter(Boolean).pop().trim();
            if (s.includes('.')) return s.split('.').filter(Boolean).pop().trim();
            return s;
        }

        function normalizeTitle(title) {
            if (!title) return '';
            return String(title).trim();
        }

        function hashString(str) {
            // 非加密 hash，用于生成稳定的 DOM id（同一 title/author 必然一致）
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = (h * 31 + str.charCodeAt(i)) >>> 0;
            }
            return h.toString(16);
        }

        function poemKeyToId(title, author) {
            const t = normalizeTitle(title);
            const a = normalizeAuthor(author);
            return 'poem-' + hashString(t + '|' + a);
        }

        })();

        function renderPoemsIndex() {
            const root = document.getElementById('poems-index');
            if (!root) return;

            let totalCount = 0;
            root.innerHTML = '';

            poemsIndexData.forEach((category) => {
                totalCount += category.items.length;

                const details = document.createElement('details');
                // 默认为展开顶部分类，提升“首页感”
                if (category.key === 'ci') details.open = true;

                const summary = document.createElement('summary');
                const left = document.createElement('span');
                left.textContent = category.name;
                const right = document.createElement('span');
                right.className = 'count';
                right.textContent = `（${category.items.length}）`;
                summary.appendChild(left);
                summary.appendChild(right);
                details.appendChild(summary);

                const list = document.createElement('ol');
                list.className = 'poems-index-list';

                category.items.forEach((item) => {
                    const poemId = poemKeyToId(item.title, item.author);
                    const poemTitleNorm = normalizeTitle(item.title);

                    const li = document.createElement('li');
                    li.className = 'poems-index-item';

                    const a = document.createElement('a');
                    a.href = '#';
                    a.dataset.poemId = poemId;
                    a.dataset.poemTitle = poemTitleNorm;
                    a.innerHTML = `<span class="toc-line"><span class="toc-author">${item.author}</span><span class="toc-title">《${item.title}》</span></span>`;
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        const el = document.getElementById(poemId);
                        const fallbackByTitle = document.querySelector(`[data-poem-title="${CSS.escape(poemTitleNorm)}"]`);
                        const targetEl = el || fallbackByTitle;

                        if (!targetEl) {
                            // 目录仍然能用，但若当前后端没加载到该诗词，就提示一下
                            alert('该条目暂无对应卡片（可能后端数据未加载到）。');
                            return;
                        }

                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // 简单高亮，提升“跳转感”
                        targetEl.style.transition = 'box-shadow 0.25s ease';
                        targetEl.style.boxShadow = '0 0 0 2px rgba(80, 180, 255, 0.35) inset, var(--shadow-lg)';
                        setTimeout(() => {
                            targetEl.style.boxShadow = '';
                        }, 1200);
                    });

                    li.appendChild(a);
                    list.appendChild(li);
                });

                details.appendChild(list);
                root.appendChild(details);
            });

            // 给用户一个总数提示（不影响 layout）
            const totalNote = document.createElement('div');
            totalNote.className = 'poems-index-total';
            totalNote.textContent = `凡 ${totalCount} 篇`;
            root.appendChild(totalNote);
        }

        function markIndexAvailability() {
            // 根据 DOM id 是否存在，给目录条目标记 found/not-found
            document.querySelectorAll('#poems-index a[data-poem-id]').forEach((a) => {
                const poemId = a.dataset.poemId;
                const poemTitleNorm = a.dataset.poemTitle || '';
                const el = document.getElementById(poemId);
                const fallbackByTitle = poemTitleNorm
                    ? document.querySelector(`[data-poem-title="${CSS.escape(poemTitleNorm)}"]`)
                    : null;

                if (el || fallbackByTitle) {
                    a.classList.add('found');
                    a.classList.remove('not-found');
                } else {
                    a.classList.add('not-found');
                }
            });
        }

        function resolvePoemContent(poem) {
            const simplified = poem.content_simplified || poem.content || '';
            const traditional = poem.content_traditional || poem.content || '';
            return { simplified, traditional };
        }

        function updateScriptToggleLabel() {
            const toggle = document.getElementById('scriptToggle');
            if (!toggle) return;
            toggle.textContent = currentScriptMode === 'traditional' ? '繁体' : '简体';
        }

        function applyScriptModeToCards() {
            const showTraditional = currentScriptMode === 'traditional';
            document.querySelectorAll('.poem-card').forEach((card) => {
                const contentEl = card.querySelector('.poem-content');
                if (!contentEl) return;
                contentEl.textContent = showTraditional
                    ? (card.dataset.contentTraditional || '')
                    : (card.dataset.contentSimplified || '');
            });
            updateScriptToggleLabel();
            localStorage.setItem(SCRIPT_MODE_STORAGE_KEY, currentScriptMode);
        }

        function setupScriptToggle() {
            const toggle = document.getElementById('scriptToggle');
            if (!toggle) return;
            updateScriptToggleLabel();
            toggle.addEventListener('click', () => {
                currentScriptMode = currentScriptMode === 'simplified' ? 'traditional' : 'simplified';
                applyScriptModeToCards();
            });
        }

        // Function to create poem card HTML
        function createPoemCard(poem) {
            const article = document.createElement('article');
            article.className = 'poem-card';
            article.id = poemKeyToId(poem.title, poem.author);
            article.dataset.poemId = article.id;
            article.dataset.poemTitle = normalizeTitle(poem.title);
            article.dataset.poemAuthor = normalizeAuthor(poem.author);
            const bilingual = resolvePoemContent(poem);
            article.dataset.contentSimplified = bilingual.simplified;
            article.dataset.contentTraditional = bilingual.traditional;
            
            // Format author if it comes from API as "Subject" and "Dynasty"
            let authorText = poem.author;
            if (poem.dynasty) {
                authorText = `${poem.dynasty} · ${poem.author}`;
            }

            article.innerHTML = `
                <h3 class="poem-title">${poem.title}</h3>
                <p class="poem-author">${authorText}</p>
                <div class="poem-content">${currentScriptMode === 'traditional' ? bilingual.traditional : bilingual.simplified}</div>
                <div class="ink-stain"></div>
            `;
            return article;
        }

        async function fetchPoems() {
            const grid = document.getElementById('poem-grid');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('error-message');
            
            // Try to fetch from local backend first.
            // Backend default from README is port 8300.
            const API_URL = 'http://127.0.0.1:8300/api/v1/poems?page=1&page_size=200';

            try {
                const response = await fetch(API_URL, { 
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    signal: AbortSignal.timeout(2000) // 2 second timeout
                });
                
                if (!response.ok) throw new Error('Network response was not ok');
                
                const result = await response.json();
                const poems = result?.data?.items || [];
                
                // Clear loading
                loading.style.display = 'none';
                
                // Render poems
                poems.forEach(poem => {
                    grid.appendChild(createPoemCard(poem));
                });
                applyScriptModeToCards();

                // 同步目录“是否可跳转”的状态
                markIndexAvailability();
                
            } catch (error) {
                console.log('Backend not available, using fallback data:', error);
                
                loading.style.display = 'none';
                errorMsg.style.display = 'block'; // Show "using fallback" message
                
                // Use fallback data（优先使用“100 篇目录占位卡片”）
                const usableFallback = indexFallbackPoems.length ? indexFallbackPoems : fallbackPoems;
                usableFallback.forEach(poem => {
                    grid.appendChild(createPoemCard(poem));
                });
                applyScriptModeToCards();

                // fallback 数量有限，只是标记出哪些条目当前可跳
                markIndexAvailability();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setupScriptToggle();
            renderPoemsIndex();
            fetchPoems();
        });
    </script>
</body>
</html>
