<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百福迎春 | Wufu Generator</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/css/main.css?v=20260312">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Import standard fonts and Chinese Calligraphy fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Long+Cang&family=Liu+Jian+Mao+Cao&family=Noto+Serif+SC:wght@700&family=ZCOOL+XiaoWei&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --festival-red: #d90429;
            --festival-gold: #fb8500;
            --paper-bg: #8d0801;
            --text-light: #fff0f3;
        }

        body {
            background-color: var(--paper-bg);
            color: var(--text-light);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239e0a0a' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .hero {
            text-align: center;
            padding: 4rem 1rem;
            animation: fadeIn 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 4rem;
            margin-bottom: 0.5rem;
            color: #ffb703;
            text-shadow: 0 4px 0 #370617;
        }

        .hero p {
            color: #ffcad4;
            font-size: 1.2rem;
        }

        .hero-dedication {
            font-size: 0.85rem !important;
            opacity: 0.85;
            margin-top: 0.5rem;
            letter-spacing: 0.15em;
        }

        /* Generator Section */
        .generator-container {
            max-width: 1000px;
            margin: 0 auto 4rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        @media (max-width: 768px) {
            .generator-container {
                grid-template-columns: 1fr;
            }
        }

        .preview-area {
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1;
            width: 100%;
            background: #ffffff;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .save-btn-preview {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(55, 6, 23, 0.92);
            color: #ffb703;
            border: 1px solid rgba(255, 183, 3, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            opacity: 0;
            transition: all 0.25s ease;
            z-index: 10;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
        }
        
        .preview-area:hover .save-btn-preview,
        .preview-area .save-btn-preview.show {
            opacity: 1;
        }
        
        .save-btn-preview:hover {
            transform: translateX(-50%) translateY(-1px);
            background: rgba(55, 6, 23, 0.96);
            border-color: #ffb703;
            box-shadow: 0 4px 16px rgba(255, 183, 3, 0.25);
        }

        .fu-display {
            font-size: 12rem;
            line-height: 1;
            user-select: none;
            transition: all 0.3s ease;
            position: absolute;
            inset: 0;
            margin: auto;
            width: fit-content;
            height: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            padding: 0;
            text-align: center;
            white-space: nowrap;
            /* 补偿书法字体视觉中心偏上 */
            transform: translateY(0.04em);
        }

        /* Decorative squared paper background (Doufang) */
        .doufang {
            position: absolute;
            /* 70.7% (1/√2)：旋转45度后菱形顶点正好触及四边中点，不超出 */
            width: 70.7%;
            height: 70.7%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            border: 2px solid #d90429;
            z-index: 1;
            opacity: 0.2;
            pointer-events: none;
        }
        
        .doufang::before {
             content: '';
             position: absolute;
             /* 内层虚线边框，保持比例 */
             top: 8%;
             left: 8%;
             right: 8%;
             bottom: 8%;
             border: 1px dashed #d90429;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .control-group label {
            font-weight: 500;
            color: #ffb703;
        }

        input[type="text"], select {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        input[type="text"]:focus, select:focus {
             border-color: #ffb703;
        }

        .color-picker-group {
            display: flex;
            gap: 1rem;
        }
        
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        
        input[type="color"]::-webkit-color-swatch {
            border: none;
        }

        .preset-fonts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
        }

        .font-btn {
            padding: 0.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-btn:hover, .font-btn.active {
            background: #ffb703;
            color: #370617;
            border-color: #ffb703;
        }

        /* Showcase Grid */
        .showcase-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            /* Default mobile layout */
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            padding: 2rem;
        }

        /* Responsive Breakpoints ensuring columns factor 100 */
        @media (min-width: 500px) {
            .showcase-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 800px) {
            .showcase-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        @media (min-width: 1200px) {
            .showcase-grid {
                grid-template-columns: repeat(10, 1fr);
            }
        }

        .fu-card {
            aspect-ratio: 1;
            background: #d90429; /* Red Paper */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem; /* Adjusted for smaller cards if needed */
            border-radius: 4px;
            color: #1a0505; /* Ink Color */
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            overflow: visible; /* Allow tooltip to show */
        }
        
        .fu-card-save-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(55, 6, 23, 0.9);
            color: #ffb703;
            border: 1px solid rgba(255, 183, 3, 0.4);
            padding: 0.3rem 0.6rem;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.65rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
            z-index: 103;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            white-space: nowrap;
            backdrop-filter: blur(6px);
        }
        
        .fu-card-save-btn.show {
            opacity: 1;
            visibility: visible;
        }
        
        .fu-card-save-btn:hover {
            transform: translateY(-1px);
            background: rgba(55, 6, 23, 0.95);
            border-color: #ffb703;
            box-shadow: 0 3px 12px rgba(255, 183, 3, 0.2);
        }

        .fu-card:hover {
            transform: scale(1.05);
            z-index: 100;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        
        .fu-card .char {
             pointer-events: none;
        }

        /* Tooltip Styles */
        .fu-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            width: max-content;
            max-width: 180px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            border: 1px solid #ffb703;
            z-index: 101;
        }

        .fu-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #ffb703 transparent transparent transparent;
        }

        .fu-card:hover .fu-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }
        
        .font-name {
            color: #ffb703;
            font-weight: bold;
            margin-bottom: 2px;
            display: block;
        }
        
        .font-desc {
            color: #ddd;
            font-size: 0.75rem;
        }
        
        .fu-card::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0,0,0,0.1);
            top: 0; left: 0;
            pointer-events: none;
        }
        
        /* Diamond shape paper style */
        .fu-card.diamond {
            background: #ffd700;
            color: #d90429;
            transform: rotate(45deg) scale(0.7);
            margin: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        
        .fu-card.diamond .char {
            transform: rotate(-45deg);
        }

        .section-title {
            text-align: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            margin: 3rem 0 2rem;
            color: #ffb703;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        button.action-btn {
            background: linear-gradient(135deg, #fb8500 0%, #ffb703 100%);
            color: #370617;
            font-weight: bold;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.2s;
            margin-top: 0.5rem;
        }
        
        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 133, 0, 0.4);
        }

        .slider {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            outline: none;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ffb703;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="showcase.html" class="nav-back-icon" aria-label="返回上一级"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <div class="container">
        <div class="hero">
            <h1>迎春纳福</h1>
            <p>定制您的专属福字，传递美好祝福</p>
            <p class="hero-dedication">—— 致 杨呦呦 ♡</p>
        </div>

        <div class="generator-container">
            <div class="preview-area" id="preview-area">
                <div class="doufang"></div>
                <div class="fu-display" id="fu-display">福</div>
                <button class="save-btn-preview" id="save-preview-btn">💾 Save</button>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>输入文字 / Input Text</label>
                    <input type="text" id="text-input" value="福" maxlength="4">
                    <small style="color: rgba(255,255,255,0.6)">推荐输入1个汉字</small>
                </div>

                <div class="control-group">
                    <label>字体风格 / Font Style</label>
                    <div class="preset-fonts" id="font-presets">
                        <div class="font-btn active" data-font="'Ma Shan Zheng', cursive" style="font-family: 'Ma Shan Zheng'">书法</div>
                        <div class="font-btn" data-font="'Zhi Mang Xing', cursive" style="font-family: 'Zhi Mang Xing'">行书</div>
                        <div class="font-btn" data-font="'Long Cang', cursive" style="font-family: 'Long Cang'">草书</div>
                        <div class="font-btn" data-font="'ZCOOL XiaoWei', serif" style="font-family: 'ZCOOL XiaoWei'">隶书</div>
                        <div class="font-btn" data-font="'ZCOOL KuaiLe', cursive" style="font-family: 'ZCOOL KuaiLe'">快乐</div>
                        <div class="font-btn" data-font="'ZCOOL QingKe HuangYou', cursive" style="font-family: 'ZCOOL QingKe HuangYou'">黄油</div>
                        <div class="font-btn" data-font="KaiTi, STKaiti, '楷体', serif" style="font-family: KaiTi, STKaiti, '楷体', serif">楷体</div>
                        <div class="font-btn" data-font="'Liu Jian Mao Cao', cursive" style="font-family: 'Liu Jian Mao Cao'">毛笔</div>
                        <div class="font-btn" data-font="'Noto Serif SC', serif" style="font-family: 'Noto Serif SC'; font-size: 14px;">宋体</div>
                        <div class="font-btn" data-font="STXingkai, 'Xingkai SC', cursive" style="font-family: STXingkai, 'Xingkai SC', cursive">行楷</div>
                    </div>
                </div>

                <div class="control-group">
                    <label>颜色设置 / Colors</label>
                    <div class="color-picker-group">
                        <div title="文字颜色">
                            <input type="color" id="text-color" value="#1a0505">
                        </div>
                        <div title="背景颜色">
                            <input type="color" id="bg-color" value="#d90429">
                        </div>
                         <div title="斗方边框">
                            <input type="color" id="border-color" value="#ffb703">
                        </div>
                    </div>
                </div>
                
                <div class="control-group">
                    <label>大小 / Size</label>
                    <input type="range" id="size-slider" min="50" max="200" value="120" class="slider">
                </div>

                <button class="action-btn" id="random-btn">🎲 随机生成样式</button>
            </div>
        </div>

        <div class="section-title">百福图鉴</div>
        <div class="showcase-grid" id="fu-grid">
            <!-- Grid items generated by JS -->
        </div>
        
        <div style="text-align: center; padding: 4rem; color: rgba(255,255,255,0.5)">
            <p>Code Dojo © 2026 - Wufu Generator</p>
        </div>
    </div>

    <script src="assets/js/wufu.js?v=20260205"></script>
</body>
</html>
