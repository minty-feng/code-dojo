                        tags: ["HELM", "MMLU", "MMLU-Pro", "BIG-bench", "SuperGLUE", "GLUE", "C-Eval", "CMMLU", "Gaokao", "AGIEval", "MT-Bench", "Arena-Hard", "AIME", "SWE-bench", "PinchBench", "有害性", "偏见", "毒性", "真实性", "幻觉", "事实性", "帮助性", "无害性", "红队测试", "越狱", "提示注入", "安全护栏", "内容过滤", "输出审查", "可解释性", "归因", "不确定性校准", "模型编辑", "知识更新", "持续对齐", "文化适应性", "多语言公平性"]
                    }
                ]
            },
            {
                title: "三、应用形态、场景与产品",
                sections: [
                    {
                        name: "行业应用",
                        tags: ["AI助手", "个人助理", "智能客服", "虚拟偶像", "数字人", "智能写作", "翻译", "会议纪要", "代码开发", "代码审查", "自动化测试", "教育辅导", "医疗辅助", "病历分析", "药物发现", "AlphaFold", "法律咨询", "合同审查", "金融风控", "反欺诈", "投研助手", "平面设计", "UI设计", "游戏开发", "音乐创作", "视频剪辑", "科学研究", "自动驾驶", "智能家居", "智慧城市", "社交媒体", "内容审核", "个性化推荐", "企业搜索", "文档管理", "流程自动化", "RPA", "会议助手", "电子邮件助手", "旅行规划", "健康管理", "心理咨询", "情感陪伴", "元宇宙", "数字孪生", "虚拟现实", "增强现实", "电商运营", "直播脚本", "跨境营销", "供应链预测"]
                    }
                ]
            },
            {
                title: "四、开发工具、框架、平台与生态",
                sections: [
                    {
                        name: "框架与平台",
                        tags: ["LangChain", "LlamaIndex", "Haystack", "Semantic Kernel", "AutoGen", "CrewAI", "DSPy", "LangGraph", "PydanticAI", "Guidance", "LMQL", "Outlines", "Instructor", "Marvin", "Mirascope", "OpenAI API", "Anthropic API", "Google AI Studio", "Vertex AI", "阿里云百炼", "腾讯云TI平台", "百度千帆", "ModelArts", "Azure AI", "AWS Bedrock", "Hugging Face Inference Endpoints", "Replicate", "Transformers", "Diffusers", "Datasets", "Spaces", "Model Hub", "GitHub", "GitLab", "PyTorch Lightning", "FastAI", "Keras", "Scikit-learn", "Jupyter", "VSCode", "Cursor", "Windsurf", "Continue", "Docker", "Kubernetes", "CI/CD", "MLflow", "Weights & Biases", "Comet", "Neptune", "Langfuse", "Helicone", "OpenTelemetry", "Optuna", "Ray Tune", "DVC", "Evidently AI", "Arize", "Pinecone", "Weaviate", "Qdrant", "Milvus", "Chroma", "ElasticSearch", "云原生", "模型市场"]
                    }
                ]
            }
        ];

        const allYears = timelineData.map(item => item.year);
        let currentYear = Math.max(...allYears);

        const viewMode = document.getElementById("viewMode");
        const topicFilter = document.getElementById("topicFilter");
        const companyFilter = document.getElementById("companyFilter");
        const searchInput = document.getElementById("searchInput");
        const yearTabs = document.getElementById("yearTabs");
        const timeline = document.getElementById("timeline");
        const keywordGroupsContainer = document.getElementById("keywordGroups");
        const keywordSearchInput = document.getElementById("keywordSearchInput");
        const prevYearBtn = document.getElementById("prevYearBtn");
        const nextYearBtn = document.getElementById("nextYearBtn");
        const stats = document.getElementById("stats");

        function dedupe(values) {
            return [...new Set(values)].sort((a, b) => a.localeCompare(b, "zh-CN"));
        }

        function initFilters() {
            topicOptions.forEach(topic => {
                const option = document.createElement("option");
                option.value = topic.id;
                option.textContent = topic.name;
                topicFilter.appendChild(option);
            });

            const companyValues = dedupe(timelineData.flatMap(yearItem =>
                yearItem.events.flatMap(event => event.companies)
            ));
            companyFilter.innerHTML = '<option value="all">全部公司/机构</option>';
            companyValues.forEach(name => {
                const option = document.createElement("option");
                option.value = name;
                option.textContent = name;
                companyFilter.appendChild(option);
            });
        }

        function renderStats() {
            const totalEvents = timelineData.reduce((sum, item) => sum + item.events.length, 0);
            const totalKeywords = keywordGroups.reduce((sum, group) =>
                sum + group.sections.reduce((sectionSum, section) => sectionSum + section.tags.length, 0), 0
            );
            const totalCompanies = dedupe(timelineData.flatMap(item => item.events.flatMap(event => event.companies))).length;
            stats.innerHTML = `
                <div class="chip"><strong>${allYears.length}</strong><span>年份</span></div>
                <div class="chip"><strong>${totalEvents}</strong><span>关键里程碑</span></div>
                <div class="chip"><strong>${totalCompanies}</strong><span>公司/机构</span></div>
                <div class="chip"><strong>${totalKeywords}</strong><span>关键词</span></div>
            `;
        }

        function renderYearTabs() {
            const showOverview = viewMode.value === "overview";
            yearTabs.innerHTML = "";

            allYears.slice().sort((a, b) => a - b).forEach(year => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.textContent = String(year);
                btn.className = year === currentYear ? "active" : "";
                btn.disabled = showOverview;
                btn.addEventListener("click", () => {
                    currentYear = year;
                    renderYearTabs();
                    renderTimeline();
                });
                yearTabs.appendChild(btn);
            });

            prevYearBtn.disabled = showOverview || currentYear === Math.min(...allYears);
            nextYearBtn.disabled = showOverview || currentYear === Math.max(...allYears);
        }

        function matchEvent(event) {
            const topicValue = topicFilter.value;
            const companyValue = companyFilter.value;
            const keyword = searchInput.value.trim().toLowerCase();

            const topicMatch = topicValue === "all" || event.topic === topicValue;
            const companyMatch = companyValue === "all" || event.companies.includes(companyValue);

            if (!keyword) {
                return topicMatch && companyMatch;
            }

            const searchCorpus = [event.title, event.note, ...event.concepts, ...event.companies].join(" ").toLowerCase();
            const keywordMatch = searchCorpus.includes(keyword);
            return topicMatch && companyMatch && keywordMatch;
        }

        function eventCard(event, year) {
            const topicName = topicOptions.find(item => item.id === event.topic)?.name || event.topic;
            const conceptsHtml = event.concepts.map(item => `<span>${item}</span>`).join("");
            const companyHtml = event.companies.map(item => `<span>${item}</span>`).join("");

            return `
                <article class="event-card">
                    <div class="event-card__head">
                        <h3>${event.title}</h3>
                        <p class="event-card__year">${year}</p>
                    </div>
                    <p class="event-card__note">${event.note}</p>
                    <div class="meta-block">
                        <p class="meta-title">专题</p>
                        <div class="tag-list"><span>${topicName}</span></div>
                    </div>
                    <div class="meta-block">
                        <p class="meta-title">相关公司/机构</p>
                        <div class="tag-list">${companyHtml}</div>
                    </div>
                    <div class="meta-block">
                        <p class="meta-title">关键概念</p>
                        <div class="tag-list">${conceptsHtml}</div>
                    </div>
                </article>
            `;
        }

        function renderTimeline() {
            const isOverview = viewMode.value === "overview";
            const yearsToShow = isOverview ? allYears.slice().sort((a, b) => a - b) : [currentYear];
            const sections = yearsToShow.map(year => {
                const yearData = timelineData.find(item => item.year === year);
                if (!yearData) {
                    return "";
                }
                const filteredEvents = yearData.events.filter(matchEvent);
                const cardsHtml = filteredEvents.length
                    ? filteredEvents.map(event => eventCard(event, year)).join("")
                    : `<p class="empty-state">当前筛选下，${year} 年暂无匹配条目。</p>`;

                return `
                    <section class="year-section">
                        <div class="year-section__title">
                            <h2>${year}</h2>
                            <p>共 ${filteredEvents.length} 条里程碑</p>
                        </div>
                        <div class="event-grid">${cardsHtml}</div>
                    </section>
                `;
            });

            timeline.innerHTML = sections.join("");
        }

        function renderKeywordGroups() {
            const keyword = keywordSearchInput.value.trim().toLowerCase();

            function escapeHtml(value) {
                return value
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function highlightMatch(value, kw) {
                const escaped = escapeHtml(value);
                if (!kw) {
                    return escaped;
                }
                const lower = value.toLowerCase();
                const start = lower.indexOf(kw);
                if (start === -1) {
                    return escaped;
                }
                const end = start + kw.length;
                const before = escapeHtml(value.slice(0, start));
                const match = escapeHtml(value.slice(start, end));
                const after = escapeHtml(value.slice(end));
                return `${before}<mark>${match}</mark>${after}`;
            }

            keywordGroupsContainer.innerHTML = keywordGroups.map(group => {
                let groupCount = 0;
                const sections = group.sections.map(section => {
                    const deduped = dedupe(section.tags);
                    const filtered = keyword
                        ? deduped.filter(tag => tag.toLowerCase().includes(keyword))
                        : deduped;

                    if (!filtered.length) {
                        return "";
                    }
                    groupCount += filtered.length;
                    const tags = filtered
                        .map(tag => `<span>${highlightMatch(tag, keyword)}</span>`)
                        .join("");
                    return `
                        <article class="keyword-section">
                            <h4>${section.name} <small>(${filtered.length})</small></h4>
                            <div class="keyword-tags">${tags}</div>
                        </article>
                    `;
                }).join("");

                if (!sections) {
                    return "";
                }
                return `
                    <section class="keyword-group">
                        <h3>${group.title} <small>(${groupCount})</small></h3>
                        ${sections}
                    </section>
                `;
            }).join("");

            if (!keywordGroupsContainer.innerHTML.trim()) {
                keywordGroupsContainer.innerHTML = `<p class="empty-state">当前检索词暂无匹配，请尝试更短或更通用的关键词。</p>`;
            }
        }

        function bindEvents() {
            [viewMode, topicFilter, companyFilter].forEach(el => {
                el.addEventListener("change", () => {
                    renderYearTabs();
                    renderTimeline();
                });
            });

            searchInput.addEventListener("input", renderTimeline);
            keywordSearchInput.addEventListener("input", renderKeywordGroups);

            prevYearBtn.addEventListener("click", () => {
                if (viewMode.value === "overview") {
                    return;
                }
                const sortedYears = allYears.slice().sort((a, b) => a - b);
                const idx = sortedYears.indexOf(currentYear);
                if (idx > 0) {
                    currentYear = sortedYears[idx - 1];
                    renderYearTabs();
                    renderTimeline();
                }
            });

            nextYearBtn.addEventListener("click", () => {
                if (viewMode.value === "overview") {
                    return;
                }
                const sortedYears = allYears.slice().sort((a, b) => a - b);
                const idx = sortedYears.indexOf(currentYear);
                if (idx < sortedYears.length - 1) {
                    currentYear = sortedYears[idx + 1];
                    renderYearTabs();
                    renderTimeline();
                }
            });
        }

        initFilters();
        renderStats();
        renderYearTabs();
        renderTimeline();
        renderKeywordGroups();
        bindEvents();
    </script>
</body>
</html>
