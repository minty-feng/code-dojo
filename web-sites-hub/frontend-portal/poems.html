<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="诗词歌赋检索、词云与收藏">
    <title>诗词歌赋 | minty-feng</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="assets/css/main.css?v=20260312">
    <link rel="stylesheet" href="assets/css/diary.css?v=20260203">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=ZCOOL+XiaoWei&display=swap");
        :root{--poems-accent:#6ea6ff;--poems-strong:#7c6dff;--poems-card:linear-gradient(160deg,rgba(16,23,37,.85),rgba(11,18,30,.8));--poems-card-border:rgba(128,156,206,.25);--poems-card-shadow:0 12px 28px rgba(6,10,20,.35);--poems-heart-bg:rgba(18,27,44,.8);--poems-stroke:rgba(128,153,201,.25);--poems-page-bg:radial-gradient(1200px 620px at 12% -5%,rgba(77,139,255,.22),transparent 60%),radial-gradient(900px 500px at 88% 110%,rgba(126,91,255,.16),transparent 60%),#050914;--poems-grid-line:rgba(125,153,211,.06);--poems-grid-line-x:rgba(125,153,211,.05);--poems-grid-opacity:.45;--poems-panel-bg:linear-gradient(145deg,rgba(17,24,39,.92),rgba(11,17,28,.85));--poems-panel-shadow:0 20px 45px rgba(4,8,18,.45);--poems-text:#e4ecff;--poems-subtext:#a8b3c9;--poems-input-bg:rgba(10,16,29,.72);--poems-chip-bg:rgba(21,31,50,.75);--poems-btn-bg:rgba(17,24,40,.8);--poems-top-btn-bg:rgba(27,37,59,.58);--poems-top-btn-hover-bg:rgba(38,52,83,.72);--poems-cloud-bg:radial-gradient(circle at 25% 24%,rgba(96,150,255,.2),transparent 56%),radial-gradient(circle at 80% 78%,rgba(129,99,255,.16),transparent 58%),rgba(9,14,27,.74);--poems-title-gradient:linear-gradient(90deg,#f0f6ff,#c6d8ff 55%,#9ad4ff)}
        [data-theme="light"]{--poems-page-bg:radial-gradient(1000px 520px at 12% -10%,rgba(213,168,83,.18),transparent 58%),radial-gradient(850px 500px at 90% 110%,rgba(185,143,72,.14),transparent 62%),#f8f1df;--poems-grid-line:rgba(158,124,72,.14);--poems-grid-line-x:rgba(158,124,72,.11);--poems-grid-opacity:.3;--poems-panel-bg:linear-gradient(145deg,rgba(255,250,236,.94),rgba(246,234,204,.9));--poems-panel-shadow:0 16px 34px rgba(120,89,40,.16);--poems-card:linear-gradient(160deg,rgba(255,249,232,.98),rgba(247,235,204,.94));--poems-card-border:rgba(176,138,83,.34);--poems-card-shadow:0 10px 22px rgba(134,101,47,.14);--poems-heart-bg:rgba(248,236,203,.94);--poems-stroke:rgba(165,127,76,.32);--poems-text:#4f3a22;--poems-subtext:#7b5f3a;--poems-input-bg:rgba(255,248,228,.95);--poems-chip-bg:rgba(252,241,212,.95);--poems-btn-bg:rgba(249,236,201,.92);--poems-top-btn-bg:rgba(247,232,193,.92);--poems-top-btn-hover-bg:rgba(240,222,178,.95);--poems-cloud-bg:radial-gradient(circle at 25% 24%,rgba(216,175,95,.2),transparent 56%),radial-gradient(circle at 80% 78%,rgba(187,145,74,.16),transparent 58%),rgba(251,242,216,.9);--poems-title-gradient:linear-gradient(90deg,#7a5525,#b07a35 45%,#d29a4d 100%)}
        body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--poems-page-bg);color:var(--poems-text)}
        body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(var(--poems-grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--poems-grid-line-x) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(circle at center,black 35%,transparent 85%);opacity:var(--poems-grid-opacity);z-index:0}
        .container{max-width:min(92vw,1320px)!important;padding:0 1rem}
        .header,.diary-main{position:relative;z-index:1}
        .diary-main{max-width:none!important;width:100%}
        .header{margin-bottom:1.1rem}
        .hero,.panel{background:var(--poems-panel-bg);border:1px solid var(--poems-stroke);border-radius:20px;padding:1.2rem;backdrop-filter:blur(10px);box-shadow:var(--poems-panel-shadow);margin-bottom:1rem}
        .hero{padding:1.4rem 1.4rem 1.15rem}
        .hero-head{display:flex;justify-content:space-between;gap:1.2rem;align-items:flex-end;margin-bottom:1rem}
        .hero-kicker{font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:#8aa7d8}
        .hero h1{margin:.15rem 0 .5rem;font-family:"ZCOOL XiaoWei","STKaiti","KaiTi",serif;font-size:2.45rem;font-weight:400;letter-spacing:.04em;background:var(--poems-title-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero p{margin:0;color:var(--poems-subtext);font-size:1.03rem;line-height:1.7;max-width:840px}
        .hero-stat{display:flex;gap:.55rem;align-items:center}
        .hero-pill{padding:.36rem .72rem;border-radius:999px;border:1px solid rgba(136,167,228,.32);background:rgba(16,28,50,.72);color:#d8e6ff;font-size:.8rem}
        .hero-grid{display:grid;grid-template-columns:1fr;gap:.9rem;margin-top:1rem}
        .cloud-card{border:1px solid rgba(132,162,228,.24);border-radius:16px;padding:.8rem;background:linear-gradient(160deg,rgba(46,78,140,.14),rgba(26,35,56,.55));transition:transform .28s ease,border-color .28s ease}
        .cloud-card:hover{transform:translateY(-2px);border-color:rgba(149,184,255,.45)}
        .cloud-title{margin:0 0 .6rem;font-family:"Noto Serif SC","Songti SC","STSong",serif;font-size:1.02rem;color:var(--poems-text);letter-spacing:.04em}
        .word-cloud{position:relative;width:90%;margin:0 auto;height:252px;border-radius:50%;background:var(--poems-cloud-bg);overflow:hidden}
        .word-cloud::after{content:"";position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(147,178,236,.1);pointer-events:none}
        .word-item{position:absolute;white-space:nowrap;font-family:"Noto Serif SC","Songti SC","STSong",serif;font-weight:700;line-height:1;opacity:.95;user-select:none;background:transparent;border:none;padding:0;cursor:pointer;transition:transform .18s ease,filter .18s ease,text-shadow .18s ease}
        .word-item:hover{transform:scale(1.08);filter:brightness(1.16);text-shadow:0 0 12px rgba(127,177,255,.45)}
        .toolbar{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr 1.1fr;gap:.65rem;align-items:end}
        .toolbar input,.toolbar select{background:var(--poems-input-bg);color:var(--poems-text);border:1px solid rgba(136,160,212,.2);border-radius:12px;padding:.64rem .78rem;outline:none;transition:border-color .18s ease,box-shadow .18s ease}
        .toolbar input:focus,.toolbar select:focus{border-color:rgba(136,188,255,.72);box-shadow:0 0 0 3px rgba(92,153,255,.16)}
        .toolbar-actions{display:flex;gap:.62rem;flex-wrap:wrap;margin-top:.82rem}
        .pager-shelf{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(128,156,206,.18);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem}
        .pager-summary{font-size:.92rem;color:var(--poems-subtext);line-height:1.55;min-width:min(100%,220px)}
        .pager-summary strong{color:var(--poems-text);font-weight:600}
        .pager-controls{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem 1rem}
        .pager-block{display:flex;align-items:center;gap:.5rem}
        .pager-block-label{font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:#8aa7d8;white-space:nowrap}
        .page-size-group{display:inline-flex;border-radius:999px;border:1px solid rgba(128,156,214,.28);overflow:hidden;background:rgba(10,16,29,.35)}
        [data-theme="light"] .page-size-group{background:rgba(255,252,240,.9)}
        .page-size-group button{font:inherit;font-size:.82rem;padding:.42rem .72rem;border:none;background:transparent;color:var(--poems-subtext);cursor:pointer;transition:background .18s ease,color .18s ease}
        .page-size-group button:hover{color:var(--poems-text);background:rgba(110,166,255,.12)}
        .page-size-group button.active{color:#fff;background:linear-gradient(120deg,#4c8bff,#7d6dff);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
        .page-nav-group{display:inline-flex;align-items:center;gap:.35rem;border-radius:14px;border:1px solid rgba(128,156,214,.28);padding:.2rem;background:rgba(10,16,29,.35)}
        [data-theme="light"] .page-nav-group{background:rgba(255,252,240,.9)}
        .page-nav-group .pager-step{min-width:40px;height:40px;border-radius:10px;border:1px solid rgba(128,156,214,.25);background:var(--poems-btn-bg);color:var(--poems-text);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;transition:border-color .18s ease,transform .15s ease}
        .page-nav-group .pager-step:hover:not(:disabled){border-color:rgba(168,194,248,.55);transform:translateY(-1px)}
        .page-nav-group .pager-step:disabled{opacity:.38;cursor:not-allowed;transform:none}
        .page-input-wrap{display:flex;align-items:center;gap:.35rem;padding:0 .45rem}
        .page-input-wrap input{width:3.2rem;text-align:center;font:inherit;font-size:.95rem;padding:.38rem .25rem;border-radius:10px;border:1px solid rgba(136,160,212,.22);background:var(--poems-input-bg);color:var(--poems-text)}
        .page-input-wrap input:focus{outline:none;border-color:rgba(136,188,255,.72);box-shadow:0 0 0 2px rgba(92,153,255,.14)}
        .page-slash{color:var(--poems-subtext);font-size:.88rem;padding:0 .1rem}
        .page-total-label{font-size:.88rem;color:var(--poems-subtext);min-width:1.5rem}
        .btn{border:1px solid rgba(128,156,214,.3);background:var(--poems-btn-bg);color:var(--poems-text);border-radius:12px;padding:.56rem .9rem;cursor:pointer;transition:all .2s ease}
        .btn:hover{transform:translateY(-1px);border-color:rgba(168,194,248,.65)}
        .btn.primary{background:linear-gradient(120deg,#4c8bff,#7d6dff);color:#fff;border:none;box-shadow:0 8px 20px rgba(88,120,255,.35)}
        .btn.ghost{background:transparent}
        .header .header-content{display:flex;align-items:center;gap:.68rem}
        .top-btn{border:1px solid rgba(130,158,212,.3);background:var(--poems-top-btn-bg);color:var(--poems-text);border-radius:14px;height:56px;display:inline-flex;align-items:center;justify-content:center;padding:0 1rem;cursor:pointer;transition:.2s ease;font-size:1.02rem;line-height:1;white-space:nowrap}
        .top-btn:hover{border-color:rgba(166,196,255,.62);background:var(--poems-top-btn-hover-bg)}
        .script-mode-toggle{min-width:72px;height:56px;border-radius:14px;border:1px dashed rgba(138,168,226,.45);background:linear-gradient(140deg,rgba(19,33,58,.82),rgba(12,21,40,.72));color:#dbe9ff;display:inline-flex;align-items:center;justify-content:center;gap:.34rem;padding:0 .75rem;cursor:pointer;transition:.2s ease}
        .script-mode-toggle:hover{transform:translateY(-1px);border-color:rgba(170,201,255,.72);background:linear-gradient(140deg,rgba(31,49,83,.86),rgba(16,29,54,.78))}
        .script-mode-icon{width:18px;height:18px;opacity:.92}
        .script-mode-label{font-size:.82rem;letter-spacing:.04em;font-weight:600}
        [data-theme="light"] .script-mode-toggle{border-color:rgba(171,136,79,.52);background:linear-gradient(140deg,rgba(252,243,219,.96),rgba(244,229,190,.9));color:#79572b}
        [data-theme="light"] .script-mode-toggle:hover{border-color:rgba(168,124,56,.72);background:linear-gradient(140deg,rgba(249,236,205,.98),rgba(238,220,173,.92))}
        .page-nav-btn{min-width:108px}
        .theme-toggle{width:56px;height:56px;border-radius:14px;padding:0;display:inline-flex;align-items:center;justify-content:center}
        .theme-icon{width:22px;height:22px}
        .meta{color:var(--poems-subtext);font-size:.88rem}
        .chip-wrap{display:flex;flex-wrap:wrap;align-items:flex-start;gap:.48rem;margin-top:.75rem;min-height:2.15rem}
        .chip-wrap.is-empty{border:1px dashed rgba(128,156,214,.24);border-radius:12px;padding:.35rem .6rem}
        .chip-empty{font-size:.82rem;color:var(--poems-subtext);line-height:1.5}
        .chip{border:1px solid rgba(131,155,206,.35);padding:.24rem .6rem;border-radius:999px;font-size:.8rem;cursor:pointer;background:var(--poems-chip-bg);color:var(--poems-text)}
        .chip.active{border-color:#7ab4ff;color:#7ab4ff}
        .poem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:1rem}
        .poem-card{background:var(--poems-card);border:1px solid var(--poems-card-border);border-radius:16px;padding:1rem 1rem .95rem;position:relative;box-shadow:var(--poems-card-shadow)}
        .poem-title{margin:0 0 .45rem;font-family:"Noto Serif SC","Songti SC","STSong",serif;font-size:1.28rem;color:var(--poems-text);letter-spacing:.03em}
        .poem-author{margin:0 0 .8rem;color:var(--poems-subtext);font-size:.88rem}
        .poem-content{white-space:pre-line;line-height:1.78;max-height:14rem;overflow:auto;color:var(--poems-subtext);padding-right:.25rem}
        .heart-btn{position:absolute;right:.8rem;top:.8rem;width:2.2rem;height:2.2rem;border-radius:999px;border:1px solid rgba(133,155,205,.32);background:var(--poems-heart-bg);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .heart-btn svg{width:18px;height:18px;stroke:#bcc9df;fill:none;stroke-width:2}
        .heart-btn.active svg{stroke:#ff6b85;fill:#ff5d79}
        .view{display:none}.view.active{display:block}
        .empty{text-align:center;color:#a8b5cb;padding:2rem 0}
        .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.8rem;white-space:pre-wrap;word-break:break-all}
        .cloud-tip{font-size:.83rem;color:#8fa5cb;margin-top:.56rem}
        @media (max-width:1280px){.toolbar{grid-template-columns:repeat(3,minmax(160px,1fr))}}
        @media (max-width:980px){.container{padding:0 .8rem}.hero-head{display:block}.hero h1{font-size:1.9rem}.poem-grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.pager-shelf{flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
    <a href="showcase.html" class="nav-back-icon" aria-label="返回上一级"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></a>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <span style="flex:1"></span>
                <button id="navCloud" type="button" class="top-btn page-nav-btn">词云页</button>
                <button id="navDiscover" type="button" class="top-btn page-nav-btn">检索页</button>
                <button id="navFavorites" type="button" class="top-btn page-nav-btn">收藏页</button>
                <button id="scriptToggle" type="button" class="script-mode-toggle" title="切换简体 / 繁体" aria-label="切换简体 / 繁体">
                    <svg class="script-mode-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <path d="M4 6h8"></path><path d="M8 6v12"></path><path d="M5 12h6"></path>
                        <path d="M14 6h6"></path><path d="M17 6v12"></path><path d="M14 16h6"></path>
                    </svg>
                    <span class="script-mode-label" id="scriptModeLabel">简</span>
                </button>
                <button class="theme-toggle" id="themeToggle" title="主题切换"><svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
            </div>
        </header>

        <main class="diary-main">
            <section id="landingView" class="view active">
                <div class="hero">
                    <div class="hero-head">
                        <div>
                            <div class="hero-kicker">POEMS ARCHIVE</div>
                            <h1>诗词歌赋探索台</h1>
                            <p>以更现代的方式阅读古典文本：点击词云词条可直接检索，支持多条件筛选、排序、简繁切换与收藏沉淀。</p>
                        </div>
                    </div>
                    <div class="hero-grid">
                        <div class="cloud-card">
                            <h3 class="cloud-title" id="cloud-title-ci">宋词高频词</h3>
                            <div class="word-cloud" id="cloud-ci"></div>
                        </div>
                        <div class="cloud-card">
                            <h3 class="cloud-title" id="cloud-title-tang">唐诗高频词</h3>
                            <div class="word-cloud" id="cloud-tang"></div>
                        </div>
                        <div class="cloud-card">
                            <h3 class="cloud-title" id="cloud-title-song">古今诗词作家高频人名</h3>
                            <div class="word-cloud" id="cloud-song"></div>
                        </div>
                        <div class="cloud-card">
                            <h3 class="cloud-title" id="cloud-title-cipai">宋词高频词牌</h3>
                            <div class="word-cloud" id="cloud-cipai"></div>
                        </div>
                    </div>
            </div>
        </section>

            <section id="discoverView" class="view">
                <div class="panel">
                    <div class="toolbar">
                        <input id="keywordInput" type="text" placeholder="关键词（标题/作者/正文）">
                        <input id="authorInput" type="text" placeholder="作者（可部分匹配）">
                        <input id="tagInput" type="text" placeholder="标签（子串匹配）">
                        <select id="dynastySelect"><option value="">全部朝代</option></select>
                        <select id="categorySelect"><option value="">全部分类</option></select>
                        <select id="sortSelect">
                            <option value="default">默认排序</option>
                            <option value="title_asc">标题升序</option>
                            <option value="author_asc">作者升序</option>
                            <option value="dynasty_asc">朝代升序</option>
                        </select>
                    </div>
                    <div class="toolbar-actions">
                        <button id="searchBtn" class="btn primary">应用筛选</button>
                        <button id="resetBtn" class="btn">重置</button>
                    </div>
                    <div class="chip-wrap" id="hotKeywords"></div>
                    <div class="pager-shelf">
                        <div class="pager-summary" id="resultMeta">尚未加载</div>
                        <div class="pager-controls">
                            <div class="pager-block">
                                <span class="pager-block-label">每页</span>
                                <div class="page-size-group" id="pageSizeGroup" role="group" aria-label="每页条数">
                                    <button type="button" data-page-size="10">10</button>
                                    <button type="button" data-page-size="20">20</button>
                                    <button type="button" data-page-size="50">50</button>
                                    <button type="button" data-page-size="100">100</button>
                                </div>
                            </div>
                            <div class="pager-block">
                                <span class="pager-block-label">翻页</span>
                                <div class="page-nav-group">
                                    <button type="button" class="pager-step" id="pagePrev" aria-label="上一页">‹</button>
                                    <div class="page-input-wrap">
                                        <input id="pageInput" type="number" min="1" step="1" value="1" inputmode="numeric" aria-label="当前页码">
                                        <span class="page-slash">/</span>
                                        <span class="page-total-label" id="pageTotalLabel">1</span>
                                    </div>
                                    <button type="button" class="pager-step" id="pageNext" aria-label="下一页">›</button>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
                <div id="poemGrid" class="poem-grid"></div>
                <div id="discoverEmpty" class="empty" style="display:none;">暂无匹配结果</div>
            </section>

            <section id="favoritesView" class="view">
                <div class="panel">
                    <h2 style="margin:.2rem 0 .7rem">我的收藏</h2>
                    <div class="toolbar-actions">
                        <button id="exportFavoritesBtn" class="btn">导出收藏 JSON</button>
                        <button id="clearFavoritesBtn" class="btn ghost">清空收藏</button>
            </div>
                    <div id="favoritesExport" class="mono"></div>
            </div>
                <div id="favoritesGrid" class="poem-grid"></div>
                <div id="favoritesEmpty" class="empty">还没有收藏，去检索页点 ❤️ 吧。</div>
            </section>
        </main>
    </div>
    <script src="assets/js/main.js?v=20260203"></script>
    <script src="assets/js/poem.config.js?v=20260415"></script>
    <script src="assets/js/poem.js?v=20260415c"></script>
</body>
